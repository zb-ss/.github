name: Update Profile README

on:
  schedule:
    - cron: '0 */6 * * *'
  repository_dispatch:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update repo list
        uses: actions/github-script@v7
        with:
          script: |
            const { data: repos } = await github.rest.repos.listForOrg({
              org: 'zb-ss',
              type: 'public',
              sort: 'updated',
              per_page: 100
            });

            const categories = {
              'TypeScript': [], 'Python': [], 'PHP': [],
              'JavaScript': [], 'Shell': [], 'Other': []
            };

            for (const repo of repos) {
              if (repo.name === '.github') continue;
              const lang = repo.language || 'Other';
              const bucket = categories[lang] || categories['Other'];
              const stars = repo.stargazers_count > 0 ? ` :star: ${repo.stargazers_count}` : '';
              const desc = repo.description || '';
              bucket.push(`| [${repo.name}](${repo.html_url}) | ${desc} |${stars}`);
            }

            let table = '';
            for (const [lang, items] of Object.entries(categories)) {
              if (items.length === 0) continue;
              table += `### ${lang}\n| Repo | Description |\n|------|-------------|\n`;
              table += items.join('\n') + '\n\n';
            }

            const fs = require('fs');
            let readme = fs.readFileSync('profile/README.md', 'utf8');
            readme = readme.replace(
              /<!-- REPOS:START -->[\s\S]*<!-- REPOS:END -->/,
              `<!-- REPOS:START -->\n${table}<!-- REPOS:END -->`
            );
            fs.writeFileSync('profile/README.md', readme);

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add profile/README.md && git commit -m "docs: update repo list" && git push)
